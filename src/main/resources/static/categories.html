<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Inventory | Categories</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .page-header {
            text-align: center;
            padding: 40px 20px;
        }
        .page-header h1 {
            font-size: 2.8rem;
        }
        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .category-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--burgundy);
            transition: all 0.4s ease;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        .category-card::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(255,255,255,0.4), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .category-card:hover::before {
            left: 150%;
        }

        .category-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.4);
            box-shadow: 0 15px 35px rgba(91, 28, 43, 0.2);
        }

        .category-card h2 {
            font-size: 2rem;
            margin: 0;
            z-index: 1;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            z-index: 1;
        }

        /* Specific card tints with higher opacity for readability */
        .card-clothing { background: linear-gradient(135deg, rgba(255,209,220,0.85), rgba(255,255,255,0.8)); }
        .card-accessories { background: linear-gradient(135deg, rgba(255,243,176,0.85), rgba(255,255,255,0.8)); }
        .card-bags { background: linear-gradient(135deg, rgba(168,230,207,0.85), rgba(255,255,255,0.8)); }
        .card-shoes { background: linear-gradient(135deg, rgba(220,160,175,0.85), rgba(255,255,255,0.8)); }
        .card-makeup { background: linear-gradient(135deg, rgba(255,182,193,0.85), rgba(255,255,255,0.8)); }
        .card-miscellaneous { background: linear-gradient(135deg, rgba(230,230,250,0.85), rgba(255,255,255,0.8)); }
        
    </style>
</head>
<body>

<div class="navbar">
    <a href="/home.html" class="logo">INVENTORY MANAGER</a>
    <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/home.html">Home</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<div class="page-header">
    <h1>Select a Category</h1>
    <p>Choose what you'd like to manage today</p>
</div>

<div class="categories-grid">
    <a href="/inventory.html?category=clothing" class="category-card card-clothing">
        <div class="icon">👗</div>
        <h2>Clothing</h2>
    </a>
    <a href="/inventory.html?category=accessories" class="category-card card-accessories">
        <div class="icon">💍</div>
        <h2>Accessories</h2>
    </a>
    <a href="/inventory.html?category=bags" class="category-card card-bags">
        <div class="icon">👜</div>
        <h2>Bags</h2>
    </a>
    <a href="/inventory.html?category=shoes" class="category-card card-shoes">
        <div class="icon">👠</div>
        <h2>Shoes</h2>
    </a>
    <a href="/inventory.html?category=makeup" class="category-card card-makeup">
        <div class="icon">💄</div>
        <h2>Makeup</h2>
    </a>
    <a href="/inventory.html?category=miscellaneous" class="category-card card-miscellaneous">
        <div class="icon">🎀</div>
        <h2>Miscellaneous</h2>
    </a>
</div>

<script>
    if(!localStorage.getItem('userId')) {
        window.location.href = '/index.html';
    }
    function logout() {
        localStorage.clear();
        window.location.href = '/index.html';
    }
</script>

</body>
</html>
