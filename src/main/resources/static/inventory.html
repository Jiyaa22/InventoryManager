<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Inventory | Manage</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .inventory-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: rgba(255,255,255,0.2);
            margin: 20px 40px;
            border-radius: 20px;
            box-shadow: var(--glass-shadow);
        }
        .header-title {
            text-transform: capitalize;
            font-size: 2.2rem;
            margin: 0;
            color: var(--burgundy);
        }
        .actions-bar {
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .search-bar {
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid var(--glass-border);
            width: 300px;
            font-size: 1rem;
            background: rgba(255,255,255,0.6);
            outline: none;
            transition: 0.3s;
        }
        .search-bar:focus {
            background: #fff;
            border-color: var(--burgundy);
        }

        .products-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 25px;
            padding: 0 40px 60px 40px;
        }

        .product-card {
            background: var(--glass-bg);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid var(--glass-border);
            box-shadow: var(--glass-shadow);
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        .product-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(91, 28, 43, 0.2);
            background: rgba(255,255,255,0.4);
        }

        .product-img-container {
            width: 100%;
            height: 250px;
            background: rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .product-img-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .product-info {
            padding: 20px;
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .product-name {
            font-size: 1.4rem;
            font-weight: 700;
            margin-bottom: 5px;
            color: var(--burgundy);
        }
        .product-stock {
            font-size: 1.1rem;
            color: var(--text-dark);
            margin-bottom: 15px;
            font-weight: 600;
        }

        .card-actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .btn-small {
            padding: 8px 12px;
            font-size: 0.9rem;
            border-radius: 8px;
            flex: 1;
            text-align: center;
        }

        /* Modal Styles */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.4);
            backdrop-filter: blur(5px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        .modal-content {
            background: #fff;
            padding: 40px;
            border-radius: 24px;
            width: 90%;
            max-width: 500px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            position: relative;
        }
        .close-btn {
            position: absolute;
            top: 20px; right: 25px;
            font-size: 1.5rem;
            cursor: pointer;
            color: #666;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: var(--burgundy);
        }
        .form-group input {
            width: 100%;
            background: #f4f4f4;
            border: 1px solid #ddd;
        }
        .form-group input:focus {
            background: #fff;
        }
    </style>
</head>
<body>

<div class="navbar">
    <a href="/home.html" class="logo">INVENTORY MANAGER</a>
    <div class="nav-links">
        <a href="/categories.html">Categories</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<div class="inventory-header">
    <h1 class="header-title" id="page-title">Category</h1>
    <div class="actions-bar">
        <input type="text" class="search-bar" id="search-input" placeholder="Search products..." onkeyup="handleSearch()">
        <button class="btn-primary" onclick="openModal()">+ Add Product</button>
    </div>
</div>

<div class="products-grid" id="products-container">
    <!-- Products rendered via JS -->
</div>

<!-- Add/Edit Product Modal -->
<div class="modal" id="productModal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h2 id="modal-title">Add Product</h2>
        <form id="productForm" onsubmit="saveProduct(event)">
            <input type="hidden" id="productId">
            <div class="form-group">
                <label>Product Name</label>
                <input type="text" id="pName" class="input-field" required>
            </div>
            <div class="form-group">
                <label>Upload Image</label>
                <input type="file" id="pFile" class="input-field" accept="image/*">
                <input type="hidden" id="pImg">
            </div>
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" id="pStock" class="input-field" min="0" required>
            </div>
            <button type="submit" class="btn-primary" style="width:100%">Save</button>
        </form>
    </div>
</div>

<script>
    if(!localStorage.getItem('userId')) window.location.href = '/index.html';

    const urlParams = new URLSearchParams(window.location.search);
    const currentCategory = urlParams.get('category') || 'All';
    document.getElementById('page-title').innerText = currentCategory + " Inventory";

    let allProducts = [];

    async function fetchProducts(search = '') {
        try {
            let url = `/api/products?category=${currentCategory}`;
            if(search) url += `&search=${search}`;
            const res = await fetch(url);
            allProducts = await res.json();
            renderProducts(allProducts);
        } catch (error) {
            console.error("Error fetching products", error);
        }
    }

    function renderProducts(products) {
        const container = document.getElementById('products-container');
        container.innerHTML = '';
        if(products.length === 0) {
            container.innerHTML = '<h3 style="grid-column: 1/-1; text-align: center; color: var(--burgundy); margin-top: 50px;">No products found in this category.</h3>';
            return;
        }

        products.forEach(p => {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            // Allow user to write just the image name, or full URL
            let imageSrc = p.imageUrl;
            if(!imageSrc.startsWith('http') && !imageSrc.startsWith('/')) {
                // If it's just "img1.jpeg" prepend /images/
                imageSrc = `/images/${imageSrc}`;
            }

            card.innerHTML = `
                <div class="product-img-container">
                    <img src="${imageSrc}" alt="${p.name}" onerror="this.src='https://via.placeholder.com/300?text=No+Image'">
                </div>
                <div class="product-info">
                    <div>
                        <div style="font-size: 0.9rem; color: #555; margin-bottom: 5px;">ID: ${p.id} | Category: ${p.category}</div>
                        <div class="product-name">${p.name}</div>
                        <div class="product-stock" id="stock-text-${p.id}">Stock: ${p.stock}</div>
                    </div>
                    <div class="card-actions">
                        <button class="btn-primary btn-small" onclick="updateStockPrompt(${p.id}, ${p.stock})">Stock</button>
                        <button class="btn-secondary btn-small" onclick='editProduct(${JSON.stringify(p)})'>Edit</button>
                        <button class="btn-secondary btn-small" style="color: #d9534f; border-color: #d9534f;" onclick="deleteProduct(${p.id})">Delete</button>
                    </div>
                </div>
            `;
            container.appendChild(card);
        });
    }

    // Search timeout
    let typetimer;
    function handleSearch() {
        clearTimeout(typetimer);
        typetimer = setTimeout(() => {
            const val = document.getElementById('search-input').value;
            fetchProducts(val);
        }, 400);
    }

    // Modal logic
    function openModal() {
        document.getElementById('productForm').reset();
        document.getElementById('productId').value = '';
        document.getElementById('pImg').value = '';
        document.getElementById('modal-title').innerText = 'Add Product';
        document.getElementById('productModal').style.display = 'flex';
    }

    function closeModal() {
        document.getElementById('productModal').style.display = 'none';
    }

    function editProduct(prod) {
        document.getElementById('productId').value = prod.id;
        document.getElementById('pName').value = prod.name;
        document.getElementById('pFile').value = '';
        document.getElementById('pImg').value = prod.imageUrl;
        document.getElementById('pStock').value = prod.stock;
        document.getElementById('modal-title').innerText = 'Edit Product';
        document.getElementById('productModal').style.display = 'flex';
    }

    async function saveProduct(e) {
        e.preventDefault();
        
        // Handle file upload first if file is selected
        let imageUrl = document.getElementById('pImg').value;
        const fileInput = document.getElementById('pFile');
        if (fileInput.files.length > 0) {
            const formData = new FormData();
            formData.append("file", fileInput.files[0]);
            const uploadRes = await fetch('/api/products/upload', {
                method: 'POST',
                body: formData
            });

            if(uploadRes.ok) {
                const uploadData = await uploadRes.json();
                imageUrl = uploadData.url;
            } else {
                alert('Upload failed! The image might be too large or invalid. Error Code: ' + uploadRes.status);
                return;
            }
        }
        
        // Ensure image URL is required logically
        if (!imageUrl) {
            alert('Please upload an image.');
            return;
        }

        const id = document.getElementById('productId').value;
        const payload = {
            name: document.getElementById('pName').value,
            category: currentCategory,
            stock: parseInt(document.getElementById('pStock').value),
            imageUrl: imageUrl
        };

        const method = id ? 'PUT' : 'POST';
        const url = id ? `/api/products/${id}` : '/api/products';

        await fetch(url, {
            method: method,
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        closeModal();
        fetchProducts();
    }

    async function updateStockPrompt(id, currentStock) {
        let newStock = prompt("Enter new stock quantity:", currentStock);
        if(newStock !== null && !isNaN(newStock) && newStock >= 0) {
            // Find product
            const p = allProducts.find(x => x.id === id);
            p.stock = parseInt(newStock);
            await fetch(`/api/products/${id}`, {
                method: 'PUT',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(p)
            });
            fetchProducts();
        }
    }

    async function deleteProduct(id) {
        if(confirm("Are you sure you want to delete this product?")) {
            await fetch(`/api/products/${id}`, { method: 'DELETE' });
            fetchProducts();
        }
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/index.html';
    }

    // Init
    fetchProducts();
</script>

</body>
</html>
