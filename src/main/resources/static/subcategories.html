<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fashion Inventory | Subcategories</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/styles.css">
    <style>
        .page-header {
            text-align: center;
            padding: 40px 20px;
        }
        .page-header h1 {
            font-size: 2.8rem;
            text-transform: capitalize;
        }
        
        .categories-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 30px;
            padding: 20px;
            max-width: 1000px;
            margin: 0 auto;
        }

        .category-card {
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 40px 20px;
            text-align: center;
            text-decoration: none;
            color: var(--burgundy);
            transition: all 0.4s ease;
            box-shadow: var(--glass-shadow);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 250px;
        }

        .category-card::before {
            content: "";
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(to right, transparent, rgba(93, 62, 62, 0.36), transparent);
            transform: skewX(-20deg);
            transition: 0.5s;
        }

        .category-card:hover::before {
            left: 150%;
        }

        .category-card:hover {
            transform: translateY(-10px);
            background: rgba(255,255,255,0.4);
            box-shadow: 0 15px 35px rgba(91, 28, 43, 0.2);
        }

        .category-card h2 {
            font-size: 2rem;
            margin: 0;
            z-index: 1;
        }

        .icon {
            font-size: 3rem;
            margin-bottom: 15px;
            z-index: 1;
        }
        
        /* Theming */
        .theme { background: linear-gradient(135deg, rgba(255,209,220,0.85), rgba(255,255,255,0.8)); }
        
    </style>
</head>
<body>

<div class="navbar">
    <a href="/home.html" class="logo">INVENTORY MANAGER</a>
    <div class="nav-links">
        <a href="/dashboard.html">Dashboard</a>
        <a href="/categories.html">Categories</a>
        <a href="#" onclick="logout()">Logout</a>
    </div>
</div>

<div class="page-header">
    <h1 id="page-title">Category</h1>
    <p>Select a subcategory to manage</p>
</div>

<div class="categories-grid" id="subcategories-grid">
    <!-- Rendered via JS -->
</div>

<script>
    if(!localStorage.getItem('userId')) {
        window.location.href = '/index.html';
    }

    function logout() {
        localStorage.clear();
        window.location.href = '/index.html';
    }

    const urlParams = new URLSearchParams(window.location.search);
    const currentCategory = urlParams.get('category');
    
    if(!currentCategory) window.location.href = '/categories.html';
    
    document.getElementById('page-title').innerText = currentCategory + " Subcategories";

    const subcategoryMap = {
        'clothing': [
            { name: 'Tops', icon: '👚' },
            { name: 'Bottoms', icon: '👖' }
        ],
        'accessories': [
            { name: 'Necklaces', icon: '📿' },
            { name: 'Watches', icon: '⌚' }
        ],
        'bags': [
            { name: 'Tote Bags', icon: '🛍️' },
            { name: 'Shoulder Bags', icon: '👜' }
        ],
        'shoes': [
            { name: 'Heels', icon: '👠' },
            { name: 'Sandals', icon: '👡' }
        ],
        'makeup': [
            { name: 'Lip Products', icon: '💄' },
            { name: 'Base Products', icon: '🎨' }
        ],
        'miscellaneous': [
            { name: 'General', icon: '🎀' }
        ]
    };
    // extra changes sir wanted
    function loadSubcategories() {
        const subs = subcategoryMap[currentCategory.toLowerCase()] || [];
        const container = document.getElementById('subcategories-grid');
        
        if (subs.length === 0) {
            window.location.href = `/inventory.html?category=${currentCategory}`;
            return;
        }

        subs.forEach(sub => {
            const a = document.createElement('a');
            a.href = `/inventory.html?category=${currentCategory}&subcategory=${encodeURIComponent(sub.name.toLowerCase())}`;
            a.className = 'category-card theme';
            a.innerHTML = `
                <div class="icon">${sub.icon}</div>
                <h2>${sub.name}</h2>
            `;
            container.appendChild(a);
        });
    }

    loadSubcategories();
</script>

</body>
</html>
